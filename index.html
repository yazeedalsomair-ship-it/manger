<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PROCEED — لوحة المدير</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --plum:#9E1F62;--plum-dark:#7A1749;--plum-light:#B52D73;
  --navy:#001F5F;--navy-mid:#0D2F80;--cyan:#00B4D8;--cyan-dark:#0090AE;
  --white:#fff;--off:#F5F7FB;
  --g50:#F8FAFD;--g100:#EDF0F7;--g200:#D8DEED;--g300:#B8C0D8;--g600:#5A6480;--g800:#1A2035;
  --green:#27AE60;--red:#C0392B;--orange:#E67E22;
  --radius:14px;--radius-sm:10px;
  --shadow:0 4px 20px rgba(0,31,95,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--off);color:var(--g800);direction:rtl;min-height:100vh}

/* ── Header ─────────────────────────────────────── */
.hdr{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 45%,var(--plum-dark) 80%,var(--plum) 100%);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.hdr-logos{display:flex;align-items:center;gap:12px}
.hdr-logo{height:36px;background:rgba(255,255,255,.92);border-radius:8px;padding:4px 12px}
.hdr-sep{width:1px;height:28px;background:rgba(255,255,255,.2)}
.hdr-title{color:#fff;font-size:14px;font-weight:800;letter-spacing:.5px}
.hdr-title span{color:var(--cyan);font-size:11px;font-weight:500;display:block;letter-spacing:1px;margin-top:1px}

/* ── Login ──────────────────────────────────────── */
.login-screen{min-height:calc(100vh - 66px);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:var(--radius);padding:36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,31,95,.12);text-align:center}
.login-icon{font-size:48px;margin-bottom:16px}
.login-title{font-size:20px;font-weight:900;color:var(--navy);margin-bottom:6px}
.login-sub{font-size:12px;color:var(--g600);margin-bottom:24px}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--g200);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;margin-bottom:12px;outline:none;transition:.2s;text-align:right}
.login-input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(0,31,95,.08)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--navy),var(--plum));color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:.2s;margin-top:4px}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}
.login-err{color:var(--red);font-size:12px;margin-top:8px;display:none}

/* ── Dashboard ──────────────────────────────────── */
.dash{display:none;padding:20px 24px;max-width:1300px;margin:0 auto}
.dash-topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.dash-title{font-size:18px;font-weight:900;color:var(--navy)}
.dash-title span{color:var(--plum);font-size:12px;font-weight:600;display:block}
.filter-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-select{padding:8px 12px;border:1.5px solid var(--g200);border-radius:9px;font-family:'Tajawal',sans-serif;font-size:12px;outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--navy)}
.btn-refresh{background:var(--plum);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.2s}
.btn-refresh:hover{background:var(--plum-dark)}
.btn-export{background:var(--navy);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.2s}
.btn-export:hover{background:#001040}
.btn-logout{background:transparent;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.25);padding:7px 14px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:11px;cursor:pointer;transition:.2s}
.btn-logout:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── Loading ────────────────────────────────────── */
.loading{text-align:center;padding:60px;color:var(--g600)}
.loading-spinner{width:40px;height:40px;border:3px solid var(--g200);border-top-color:var(--plum);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Summary Cards ──────────────────────────────── */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.sum-card{background:#fff;border-radius:var(--radius-sm);padding:14px 16px;box-shadow:var(--shadow);border-top:3px solid var(--g200)}
.sum-card.c-navy{border-top-color:var(--navy)}
.sum-card.c-plum{border-top-color:var(--plum)}
.sum-card.c-green{border-top-color:var(--green)}
.sum-card.c-red{border-top-color:var(--red)}
.sum-card.c-cyan{border-top-color:var(--cyan)}
.sum-card.c-orange{border-top-color:var(--orange)}
.sum-lbl{font-size:10px;color:var(--g600);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.sum-val{font-size:22px;font-weight:900;color:var(--g800)}
.sum-sub{font-size:10px;color:var(--g600);margin-top:3px}

/* ── Warehouse sections ─────────────────────────── */
.wh-section{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.wh-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;cursor:pointer;user-select:none}
.wh-header-navy{background:linear-gradient(135deg,var(--navy),var(--navy-mid))}
.wh-header-plum{background:linear-gradient(135deg,var(--plum-dark),var(--plum))}
.wh-header-teal{background:linear-gradient(135deg,#0D5C63,#0D7377)}
.wh-name{color:#fff;font-size:14px;font-weight:800;display:flex;align-items:center;gap:10px}
.wh-badge{background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.wh-toggle{color:rgba(255,255,255,.7);font-size:16px;transition:.3s}
.wh-body{display:none;padding:18px}
.wh-body.open{display:block}
.sub-sec{margin-bottom:20px}
.sub-sec-title{font-size:11px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:8px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--g50);border-radius:9px;padding:10px 12px;border:1px solid var(--g100)}
.kpi-lbl{font-size:9px;color:var(--g600);font-weight:700;text-transform:uppercase;margin-bottom:4px;letter-spacing:.3px}
.kpi-val{font-size:17px;font-weight:800;color:var(--navy)}
.kpi-sub{font-size:9px;color:var(--g600);margin-top:2px}

/* ── Tables ─────────────────────────────────────── */
.tw{overflow-x:auto;border:1px solid var(--g100);border-radius:9px;margin-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:450px}
th{background:var(--navy);color:#fff;padding:7px 10px;text-align:right;font-weight:600;font-size:10px;white-space:nowrap}
td{padding:6px 10px;border-bottom:1px solid var(--g100);text-align:right}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f5f0f8}
.ot-pos{color:var(--green);font-weight:700}
.ot-neg{color:var(--red);font-weight:700}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:800}
.p-100{background:#D5F5E3;color:#0F6E56}
.p-95{background:#EBF5FB;color:#1A5276}
.p-85{background:#FEF9E7;color:#7D6608}
.p-70{background:#FAEBD7;color:#B7770D}
.p-0{background:#FDEDEC;color:#C0392B}

/* ── Equipment ──────────────────────────────────── */
.equip-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.equip-item{background:var(--g50);border:1px solid var(--g100);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.equip-ico{font-size:18px}
.equip-lbl{font-size:9px;color:var(--g600)}
.equip-cnt{font-size:15px;font-weight:800;color:var(--navy)}

/* ── Empty ──────────────────────────────────────── */
.empty-state{text-align:center;padding:20px;color:var(--g300);font-size:12px}
.alert-warn{background:#FEF9E7;border:1px solid #F9E79F;border-radius:8px;padding:8px 12px;font-size:11px;color:#7D6608;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.alert-err{background:#FDEDEC;border:1px solid #F1948A;border-radius:8px;padding:8px 12px;font-size:11px;color:#922B21;margin-bottom:12px}

@media(max-width:600px){.dash{padding:12px}}
</style>
</head>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmLxqV4u5F36WfqWB-eewASjfRelVnyDw",
  authDomain: "proceed-logistics-71fba.firebaseapp.com",
  projectId: "proceed-logistics-71fba",
  storageBucket: "proceed-logistics-71fba.firebasestorage.app",
  messagingSenderId: "1004382478688",
  appId: "1:1004382478688:web:2ecf3177163bb1a7673e05"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const WH_LIST = [
  {id:'alula',    name:'مستودع العلا',      hdr:'wh-header-navy'},
  {id:'yanbu',    name:'مستودع ينبع',       hdr:'wh-header-plum'},
  {id:'dawadmi',  name:'مستودع الدوادمي',   hdr:'wh-header-teal'},
  {id:'sulayyil', name:'مستودع السليل',     hdr:'wh-header-navy'},
  {id:'sudair',   name:'مستودع سدير',       hdr:'wh-header-plum'},
];

const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const MO={January:1,February:2,March:3,April:4,May:5,June:6,July:7,August:8,September:9,October:10,November:11,December:12};

const EQUIP_DEF = [
  {key:'reachTruck',icon:'🚜',label:'Reach Truck'},
  {key:'handJack',icon:'🚎',label:'Hand Jack'},
  {key:'pestControl',icon:'🪲',label:'Pest Control'},
  {key:'cleaningMachine',icon:'🧹',label:'Clean Machine'},
  {key:'cageCart',icon:'🛒',label:'Cage Cart'},
  {key:'truck10t',icon:'🚛',label:'10-ton Truck'},
  {key:'truck5t',icon:'🚚',label:'5-ton Truck'},
];

// ── Auth ───────────────────────────────────────────────────────
window.doLogin = async function() {
  const email = document.getElementById('mgEmail').value.trim();
  const pass  = document.getElementById('mgPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display='none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    // check manager role in Firestore
    const snap = await getDoc(doc(db,'managers',email.toLowerCase()));
    if(!snap.exists()) throw new Error('no_access');
    showDash();
  } catch(e) {
    errEl.style.display='block';
    errEl.textContent = e.message==='no_access'
      ? 'ليس لديك صلاحية الوصول كمدير'
      : 'بريد أو كلمة مرور غير صحيحة';
  }
};

window.logout = async function() {
  await signOut(auth);
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('dashScreen').style.display='none';
  document.getElementById('logoutBtn').style.display='none';
};

function showDash() {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashScreen').style.display='block';
  document.getElementById('logoutBtn').style.display='block';
  const d=new Date();
  document.getElementById('fMonth').value = d.getMonth()+1;
  document.getElementById('fYear').value  = d.getFullYear();
  loadAll();
}

// ── Load all warehouses ────────────────────────────────────────
window.loadAll = async function() {
  const sec = document.getElementById('whSections');
  const cards = document.getElementById('summaryCards');
  sec.innerHTML   = `<div class="loading"><div class="loading-spinner"></div>جاري جلب بيانات المستودعات...</div>`;
  cards.innerHTML = '';

  const m = document.getElementById('fMonth').value;
  const y = document.getElementById('fYear').value;
  const key = y+'_'+m;

  const results = await Promise.all(WH_LIST.map(async wh => {
    try {
      const snap = await getDoc(doc(db,'warehouses',wh.id));
      return {...wh, data: snap.exists()&&snap.data().dashboardData ? snap.data().dashboardData : null};
    } catch(e) { return {...wh, data:null}; }
  }));

  document.getElementById('lastUpdate').textContent = 'آخر تحديث: '+new Date().toLocaleTimeString('ar-SA');
  window._mgr = results;
  buildSummaryCards(results, key, m, y);
  buildWhSections(results, key);
};

// ── Global summary cards ───────────────────────────────────────
function buildSummaryCards(warehouses, key, m, y) {
  const el = document.getElementById('summaryCards');
  let totalEmp=0, totalOTEmps=0, totalEvals=0, totalRated=0, totalEquip=0, urgentEquip=0;

  for(const wh of warehouses) {
    if(!wh.data) continue;
    const att = wh.data.attendanceData?.[key];
    if(att) { totalEmp+=att.totals.totalEmp||0; totalOTEmps+=att.totals.countOvertime||0; }
    const evals = (wh.data.evaluations||[]).filter(e=>e.month==m&&e.year==y);
    totalEvals += evals.length;
    totalRated += evals.filter(e=>(e.incentive||0)>0).length;
    const eq = wh.data.equipment||[];
    totalEquip += eq.length;
    urgentEquip += eq.filter(e=>parseInt(e.maintHours)-parseInt(e.opHours)<=100).length;
  };

  // Outbound + ASN totals per selected month
  let totDis=0,totRush=0,totCan=0,totShort=0,totTRK=0,totASNqty=0;
  for(const wh of warehouses){
    if(!wh.data) continue;
    const ob=wh.data.outbound;
    if(ob&&ob.monthly) ob.monthly.filter(x=>x.mo==parseInt(m)&&x.year==parseInt(y))
      .forEach(x=>{totDis+=x.orders||0;totRush+=x.rush||0;totShort+=x.shQty||0;});
    if(ob&&ob.cancelledMonthly) ob.cancelledMonthly.filter(x=>x.year==parseInt(y)&&MO[x.month]==parseInt(m))
      .forEach(x=>{totCan+=x.count||0;});
    const asn=wh.data.asn;
    if(asn&&asn.monthly) asn.monthly.filter(x=>x.mo==parseInt(m)&&x.year==parseInt(y))
      .forEach(x=>{totTRK+=x.orders||0;totASNqty+=x.qty||0;});
  }
  const mName = MONTHS[(parseInt(m)||1)-1];
  el.innerHTML = `
    <div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.5px;padding-bottom:4px;border-bottom:1px solid var(--g100)">👥 الموارد البشرية — ${mName} ${y}</div>
    <div class="sum-card c-navy"><div class="sum-lbl">إجمالي الموظفين</div><div class="sum-val">${totalEmp}</div></div>
    <div class="sum-card c-green"><div class="sum-lbl">لديهم OT</div><div class="sum-val">${totalOTEmps}</div></div>
    <div class="sum-card c-plum"><div class="sum-lbl">مُقيَّمون</div><div class="sum-val">${totalEvals}</div></div>
    <div class="sum-card c-cyan"><div class="sum-lbl">لديهم حوافز</div><div class="sum-val">${totalRated}</div></div>
    <div class="sum-card c-orange"><div class="sum-lbl">معدات</div><div class="sum-val">${totalEquip}</div></div>
    <div class="sum-card c-red"><div class="sum-lbl">تحتاج صيانة</div><div class="sum-val">${urgentEquip}</div></div>
    <div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.5px;padding-bottom:4px;border-bottom:1px solid var(--g100);margin-top:6px">📤 Outbound & ASN — ${mName} ${y}</div>
    <div class="sum-card c-navy"><div class="sum-lbl">Dispatched</div><div class="sum-val">${totDis.toLocaleString()}</div></div>
    <div class="sum-card c-red"><div class="sum-lbl">Short QTY</div><div class="sum-val">${totShort.toLocaleString()}</div></div>
    <div class="sum-card c-orange"><div class="sum-lbl">Rush Orders</div><div class="sum-val">${totRush.toLocaleString()}</div></div>
    <div class="sum-card c-plum"><div class="sum-lbl">Cancelled</div><div class="sum-val">${totCan.toLocaleString()}</div></div>
    <div class="sum-card c-green"><div class="sum-lbl">ASN TRK</div><div class="sum-val">${totTRK.toLocaleString()}</div></div>
    <div class="sum-card c-cyan"><div class="sum-lbl">ASN QTY</div><div class="sum-val">${(totASNqty/1000).toFixed(1)}K</div></div>
  `;
}

// ── Per-warehouse sections ─────────────────────────────────────
function buildWhSections(warehouses, key) {
  const el = document.getElementById('whSections');
  el.innerHTML = '';

  for(const wh of warehouses) {
    const d = wh.data;
    const att    = d?.attendanceData?.[key];
    const m = document.getElementById('fMonth').value;
    const y = document.getElementById('fYear').value;
    const evals  = (d?.evaluations||[]).filter(e=>e.month==m&&e.year==y);
    const counts = d?.equipmentCounts||{};
    const equip  = d?.equipment||[];
    const hasData = att||evals.length||(equip.length)||(EQUIP_DEF.some(x=>(counts[x.key]||0)>0));

    const sec = document.createElement('div');
    sec.className = 'wh-section';

    // ── Header ──
    const urgentEq = equip.filter(e=>parseInt(e.maintHours)-parseInt(e.opHours)<=100).length;
    sec.innerHTML = `
      <div class="wh-header ${wh.hdr}" onclick="toggleWh(this)">
        <div class="wh-name">
          🏭 ${wh.name}
          ${att?`<span class="wh-badge">${att.totals.totalEmp} موظف</span>`:'<span class="wh-badge" style="opacity:.5">لا توجد بيانات</span>'}
          ${urgentEq?`<span class="wh-badge" style="background:rgba(255,82,82,.3)">⚠️ ${urgentEq} صيانة</span>`:''}</div>
        <span class="wh-toggle">▼</span>
      </div>
      <div class="wh-body">
        ${!hasData?'<div class="empty-state">لا توجد بيانات محفوظة لهذا المستودع</div>':''}

        ${att ? buildAttSection(att) : ''}
        ${evals.length ? buildEvalSection(evals) : ''}
        ${buildObAsnSection(wh.data, m, y)}
        ${buildEquipSection(counts, equip)}
      </div>`;
    el.appendChild(sec);
  }
}

window.toggleWh = function(hdr) {
  const body = hdr.nextElementSibling;
  const arrow = hdr.querySelector('.wh-toggle');
  body.classList.toggle('open');
  arrow.style.transform = body.classList.contains('open')?'rotate(180deg)':'rotate(0deg)';
};

// ── Attendance ─────────────────────────────────────────────────
function buildAttSection(att) {
  const t = att.totals;
  const emps = [...(att.employees||[])].sort((a,b)=>b.diffMins-a.diffMins);
  const rows = emps.map(e=>{
    const cls = e.diffMins>0?'ot-pos':(e.diffMins<0?'ot-neg':'');
    const sg  = e.diffMins>0?'+':(e.diffMins<0?'−':'');
    return `<tr><td style="font-weight:700">${e.name}</td><td style="font-family:monospace;font-size:10px;color:var(--g600)">${e.id}</td><td style="direction:ltr">${e.req}</td><td style="direction:ltr">${e.worked}</td><td class="${cls}" style="direction:ltr">${sg}${e.diffStr}</td></tr>`;
  }).join('');
  return `<div class="sub-sec">
    <div class="sub-sec-title">👥 الحضور والعمل الإضافي</div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-lbl">الموظفون</div><div class="kpi-val">${t.totalEmp}</div></div>
      <div class="kpi"><div class="kpi-lbl">لديهم OT</div><div class="kpi-val" style="color:var(--green)">${t.countOvertime}</div></div>
      <div class="kpi"><div class="kpi-lbl">إجمالي OT</div><div class="kpi-val" style="color:var(--green);direction:ltr">+${t.totalOvertime}</div><div class="kpi-sub">ساعة</div></div>
      <div class="kpi"><div class="kpi-lbl">إجمالي النقص</div><div class="kpi-val" style="color:var(--red);direction:ltr">-${t.totalShortage}</div><div class="kpi-sub">ساعة</div></div>
    </div>
    <div class="tw"><table><thead><tr><th>الاسم</th><th>الرقم</th><th>مطلوب</th><th>فعلي</th><th>الفرق</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

// ── Evaluations ────────────────────────────────────────────────
function buildEvalSection(evals) {
  const avg = (evals.reduce((s,e)=>s+parseFloat(e.achievement||0),0)/evals.length).toFixed(1);
  const over=evals.filter(e=>(e.incentive||0)>=100).length;
  const mid =evals.filter(e=>(e.incentive||0)>0&&(e.incentive||0)<100).length;
  const zero=evals.filter(e=>(e.incentive||0)===0).length;
  const rows=evals.map(e=>{
    const p=e.incentive||0;
    const cls=p>=100?'p-100':p>=85?'p-95':p>=70?'p-85':p>0?'p-70':'p-0';
    const ac=parseFloat(e.achievement)>=90?'var(--green)':'var(--red)';
    return `<tr><td style="font-weight:700">${e.name}</td><td style="color:var(--plum);font-size:10px;font-weight:600">${e.role||'—'}</td><td style="font-size:10px">${e.section||'—'}</td><td style="color:${ac};font-weight:700;direction:ltr">${e.achievement}%</td><td style="text-align:center"><span class="pill ${cls}">${p}%</span></td><td style="font-size:10px;color:var(--g600)">${e.notes||'—'}</td></tr>`;
  }).join('');
  return `<div class="sub-sec">
    <div class="sub-sec-title">⭐️ التقييم والحوافز</div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-lbl">مُقيَّمون</div><div class="kpi-val" style="color:var(--plum)">${evals.length}</div></div>
      <div class="kpi"><div class="kpi-lbl">متوسط الإنجاز</div><div class="kpi-val">${avg}%</div></div>
      <div class="kpi"><div class="kpi-lbl">حافز 100%+</div><div class="kpi-val" style="color:var(--green)">${over}</div></div>
      <div class="kpi"><div class="kpi-lbl">حافز 70-95%</div><div class="kpi-val" style="color:var(--navy)">${mid}</div></div>
      <div class="kpi"><div class="kpi-lbl">بدون حافز</div><div class="kpi-val" style="color:var(--red)">${zero}</div></div>
    </div>
    <div class="tw"><table><thead><tr><th>الاسم</th><th>الوظيفة</th><th>القسم</th><th>الإنجاز</th><th style="text-align:center">الحافز</th><th>ملاحظات</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

// ── Equipment ──────────────────────────────────────────────────
function buildEquipSection(counts, equip) {
  const hasEquip = EQUIP_DEF.some(d=>(counts[d.key]||0)>0)||equip.length;
  if(!hasEquip) return '';
  const urgent = equip.filter(e=>parseInt(e.maintHours)-parseInt(e.opHours)<=100);
  const eRows = equip.map(eq=>{
    const diff=parseInt(eq.maintHours)-parseInt(eq.opHours);
    const sc=diff<=0?'🔴 متأخرة':diff<=100?'🟡 قريبة':'🟢 جيدة';
    const dc=diff<=0?'var(--red)':diff<=100?'var(--orange)':'var(--green)';
    return `<tr><td style="font-weight:700">${eq.name}</td><td style="direction:ltr">${eq.opHours}</td><td style="direction:ltr">${eq.maintHours}</td><td style="color:${dc};font-weight:700;direction:ltr">${diff>0?'+':''}${diff}</td><td>${sc}</td></tr>`;
  }).join('');
  return `<div class="sub-sec">
    <div class="sub-sec-title">⚙️ المعدات والأصول ${urgent.length?`<span style="background:#FDEDEC;color:var(--red);padding:2px 8px;border-radius:10px;font-size:10px">⚠️ ${urgent.length} تحتاج صيانة</span>`:''}</div>
    <div class="equip-grid">
      ${EQUIP_DEF.map(d=>`<div class="equip-item"><span class="equip-ico">${d.icon}</span><div><div class="equip-lbl">${d.label}</div><div class="equip-cnt">${counts[d.key]||0}</div></div></div>`).join('')}
    </div>
    ${equip.length?`<div class="tw"><table><thead><tr><th>المعدة</th><th>ساعات التشغيل</th><th>موعد الصيانة</th><th>المتبقي</th><th>الحالة</th></tr></thead><tbody>${eRows}</tbody></table></div>`:''}
  </div>`;
}


// ── Outbound / ASN / Rush per warehouse ──────────────────────
function buildObAsnSection(data, m, y) {
  if(!data) return '';
  const ob=data.outbound, asn=data.asn;
  const mNum=parseInt(m), yNum=parseInt(y);
  const fmt=v=>(v||0).toLocaleString();
  const r1=v=>Math.round((v||0)*10)/10;
  let out='';
  if(ob&&ob.monthly){
    const mo=(ob.monthly||[]).find(x=>x.mo==mNum&&x.year==yNum);
    if(mo){
      const cn=((ob.cancelledMonthly||[]).find(c=>c.year==yNum&&MO[c.month]==mNum)||{count:0}).count;
      const rp=mo.orders?((mo.rush/mo.orders)*100).toFixed(1):0;
      out+=`<div class="sub-sec"><div class="sub-sec-title">📤 Outbound Summary</div>
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-lbl">Dispatched</div><div class="kpi-val" style="color:var(--navy)">${fmt(mo.orders)}</div></div>
          <div class="kpi"><div class="kpi-lbl">Rush</div><div class="kpi-val" style="color:var(--red)">${fmt(mo.rush)}</div><div class="kpi-sub">${rp}%</div></div>
          <div class="kpi"><div class="kpi-lbl">Cancelled</div><div class="kpi-val" style="color:var(--g600)">${fmt(cn)}</div></div>
          <div class="kpi"><div class="kpi-lbl">Short QTY</div><div class="kpi-val" style="color:var(--red)">${fmt(mo.shQty)}</div></div>
          <div class="kpi"><div class="kpi-lbl">Dispatched QTY</div><div class="kpi-val" style="color:var(--green)">${fmt(mo.disQty)}</div></div>
          <div class="kpi"><div class="kpi-lbl">Median CS</div><div class="kpi-val">${r1(mo.medCS)}</div><div class="kpi-sub">سا</div></div>
          <div class="kpi"><div class="kpi-lbl">Median Pick</div><div class="kpi-val">${r1(mo.medPick)}</div><div class="kpi-sub">سا</div></div>
        </div>`;
      if(mo.rush>0) out+=`<div style="background:#FEF5F5;border:1px solid #F5C6CB;border-radius:8px;padding:10px 14px;margin-top:6px">
        <div style="font-size:10px;font-weight:800;color:var(--red);margin-bottom:8px">🚨 Rush تفصيل</div>
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-lbl">Rush Count</div><div class="kpi-val" style="color:var(--red)">${fmt(mo.rush)}</div></div>
          <div class="kpi"><div class="kpi-lbl">Ordered QTY</div><div class="kpi-val">${fmt(mo.rushOrdQty||0)}</div></div>
          <div class="kpi"><div class="kpi-lbl">Short QTY</div><div class="kpi-val" style="color:var(--red)">${fmt(mo.rushShQty||0)}</div></div>
          <div class="kpi"><div class="kpi-lbl">Median CS</div><div class="kpi-val">${r1(mo.rushMedCS||0)}</div><div class="kpi-sub">سا</div></div>
          <div class="kpi"><div class="kpi-lbl">Median Pick</div><div class="kpi-val">${r1(mo.rushMedPick||0)}</div><div class="kpi-sub">سا</div></div>
        </div></div>`;
      out+=`</div>`;
    }
  }
  if(asn&&asn.monthly){
    const mo=(asn.monthly||[]).find(x=>x.mo==mNum&&x.year==yNum);
    if(mo) out+=`<div class="sub-sec"><div class="sub-sec-title">🏭 ASN Receipts</div>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-lbl">TRK</div><div class="kpi-val" style="color:var(--navy)">${fmt(mo.orders)}</div></div>
        <div class="kpi"><div class="kpi-lbl">PO Lines</div><div class="kpi-val">${fmt(mo.lines)}</div></div>
        <div class="kpi"><div class="kpi-lbl">Received QTY</div><div class="kpi-val" style="color:var(--green)">${fmt(mo.qty)}</div></div>
        <div class="kpi"><div class="kpi-lbl">أيام عمل</div><div class="kpi-val">${mo.days}</div></div>
        <div class="kpi"><div class="kpi-lbl">Avg TRK/يوم</div><div class="kpi-val" style="color:var(--cyan)">${r1(mo.avgOrd)}</div></div>
      </div></div>`;
  }
  return out;
}

// ── Export Excel ───────────────────────────────────────────────
window.exportAll = function() {
  const m=document.getElementById('fMonth').value;
  const y=document.getElementById('fYear').value;
  const key=y+'_'+m;
  const mName=MONTHS[(parseInt(m)||1)-1];
  const whs=window._mgr||[];
  if(!whs.length){alert('انتظر حتى تكتمل البيانات');return;}
  const wb=XLSX.utils.book_new();

  // الحوافز
  const ev=[];
  for(const wh of whs)(wh.data&&wh.data.evaluations||[]).filter(e=>e.month==m&&e.year==y)
    .forEach(e=>ev.push({'المستودع':wh.name,'الاسم':e.name,'الوظيفة':e.role||'—','القسم':e.section||'—','الإنجاز%':parseFloat(e.achievement)||0,'الحافز%':e.incentive||0,'ملاحظات':e.notes||'—'}));
  if(ev.length){const ws=XLSX.utils.json_to_sheet(ev);ws['!views']=[{rightToLeft:true}];XLSX.utils.book_append_sheet(wb,ws,'الحوافز');}

  // ملخص الساعات
  const as=[],ad=[];
  for(const wh of whs){const att=wh.data&&wh.data.attendanceData&&wh.data.attendanceData[key];if(!att)continue;
    const t=att.totals;
    as.push({'المستودع':wh.name,'الموظفون':t.totalEmp,'OT Count':t.countOvertime,'إجمالي OT':t.totalOvertime,'إجمالي النقص':t.totalShortage});
    (att.employees||[]).forEach(e=>{const sg=e.diffMins>0?'+':(e.diffMins<0?'-':'');
      ad.push({'المستودع':wh.name,'الاسم':e.name,'الرقم':e.id,'مطلوب':e.req,'فعلي':e.worked,'الفرق':sg+e.diffStr,'النوع':e.diffMins>0?'OT':e.diffMins<0?'نقص':'مطابق'});});}
  if(as.length){const ws=XLSX.utils.json_to_sheet(as);ws['!views']=[{rightToLeft:true}];XLSX.utils.book_append_sheet(wb,ws,'ملخص الساعات');}
  if(ad.length){const ws=XLSX.utils.json_to_sheet(ad);ws['!views']=[{rightToLeft:true}];XLSX.utils.book_append_sheet(wb,ws,'تفصيل الحضور');}

  // Outbound & Rush
  const ob=[];
  for(const wh of whs){const o=wh.data&&wh.data.outbound;if(!o||!o.monthly)continue;
    const mo=(o.monthly||[]).find(x=>x.mo==parseInt(m)&&x.year==parseInt(y));if(!mo)continue;
    const cn=((o.cancelledMonthly||[]).find(c=>c.year==parseInt(y)&&MO[c.month]==parseInt(m))||{count:0}).count;
    ob.push({'المستودع':wh.name,'Dispatched':mo.orders||0,'Rush':mo.rush||0,'Cancelled':cn,'Ordered QTY':mo.ordQty||0,'Short QTY':mo.shQty||0,'Dispatched QTY':mo.disQty||0,'Median CS (سا)':mo.medCS||0,'Median Pick (سا)':mo.medPick||0,'Rush Ordered':mo.rushOrdQty||0,'Rush Short':mo.rushShQty||0,'Rush Median CS':mo.rushMedCS||0,'Rush Median Pick':mo.rushMedPick||0});}
  if(ob.length){const ws=XLSX.utils.json_to_sheet(ob);ws['!views']=[{rightToLeft:true}];XLSX.utils.book_append_sheet(wb,ws,'Outbound & Rush');}

  // ASN
  const an=[];
  for(const wh of whs){const a=wh.data&&wh.data.asn;if(!a||!a.monthly)continue;
    const mo=(a.monthly||[]).find(x=>x.mo==parseInt(m)&&x.year==parseInt(y));if(!mo)continue;
    an.push({'المستودع':wh.name,'TRK':mo.orders||0,'PO Lines':mo.lines||0,'Received QTY':mo.qty||0,'أيام عمل':mo.days||0,'Avg TRK/يوم':mo.avgOrd||0});}
  if(an.length){const ws=XLSX.utils.json_to_sheet(an);ws['!views']=[{rightToLeft:true}];XLSX.utils.book_append_sheet(wb,ws,'ASN Receipts');}

  // المعدات
  const eq=[];
  const ed=[{k:'reachTruck',l:'Reach Truck'},{k:'handJack',l:'Hand Jack'},{k:'pestControl',l:'Pest Control'},{k:'cleaningMachine',l:'Clean Machine'},{k:'cageCart',l:'Cage Cart'},{k:'truck10t',l:'10-ton Truck'},{k:'truck5t',l:'5-ton Truck'}];
  for(const wh of whs){const c=(wh.data&&wh.data.equipmentCounts)||{};
    ed.forEach(d=>{if((c[d.k]||0)>0)eq.push({'المستودع':wh.name,'النوع':d.l,'العدد':c[d.k]||0,'المعدة':'—','الحالة':'أصل ثابت'});});
    (wh.data&&wh.data.equipment||[]).forEach(e=>{const d=parseInt(e.maintHours)-parseInt(e.opHours);
      eq.push({'المستودع':wh.name,'النوع':'متابَعة','العدد':1,'المعدة':e.name,'الحالة':d<=0?'متأخرة':d<=100?'قريبة':'جيدة'});});}
  if(eq.length){const ws=XLSX.utils.json_to_sheet(eq);ws['!views']=[{rightToLeft:true}];XLSX.utils.book_append_sheet(wb,ws,'المعدات');}

  if(!wb.SheetNames.length){alert('لا توجد بيانات للتصدير');return;}
  XLSX.writeFile(wb,`تقرير_المدير_${mName}_${y}.xlsx`);
};
</script>
</body>
